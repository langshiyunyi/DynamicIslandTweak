name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      scheme:
        description: '构建方案'
        type: choice
        options:
          - rootless
          - roothide
          - both
        default: both
      sdk-version:
        description: 'iOS SDK 版本（推荐 14.5，因为包含 Preferences 私有框架）'
        type: string
        default: '14.5'          # 默认使用 14.5，确保 Preferences.framework 存在
  workflow_call:
    inputs:
      scheme:
        description: '构建方案：rootless / roothide / both'
        type: string
        default: both
      sdk-version:
        description: 'iOS SDK 版本（推荐 14.5）'
        type: string
        default: '14.5'
      make-target:
        description: 'make 目标（默认 package）'
        type: string
        default: package
      extra-make-flags:
        description: '额外 make 参数'
        type: string
        default: ''
      artifact-retention:
        description: 'artifact 保留天数'
        type: number
        default: 30
      theos-ref:
        description: 'Theos 仓库引用（分支/tag/commit）'
        type: string
        default: master

env:
  THEOS_LANGUAGE: english

jobs:
  prepare:
    name: 准备
    runs-on: macos-latest
    outputs:
      schemes: ${{ steps.set.outputs.schemes }}
      pkg-name: ${{ steps.set.outputs.pkg-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 读取包名
        id: set
        run: |
          input="${{ inputs.scheme || 'both' }}"
          if [ "$input" = "both" ]; then
            echo 'schemes=["rootless","roothide"]' >> "$GITHUB_OUTPUT"
          else
            echo "schemes=[\"$input\"]" >> "$GITHUB_OUTPUT"
          fi
          pkg=""
          if [ -f control ]; then
            pkg=$(grep -m1 '^Package:' control | awk '{print $2}')
          fi
          pkg=${pkg:-theos-package}
          echo "pkg-name=$pkg" >> "$GITHUB_OUTPUT"
          echo "检测到包名: $pkg"

  build:
    name: 构建 (${{ matrix.scheme }})
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        scheme: ${{ fromJson(needs.prepare.outputs.schemes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 缓存 Theos
        uses: actions/cache@v4
        with:
          path: ~/theos
          key: theos-macos-${{ inputs.theos-ref || 'master' }}-v2

      - name: Setup Theos
        env:
          THEOS_REF: ${{ inputs.theos-ref || 'master' }}
        run: |
          set -x
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          if [ ! -d "$HOME/theos/.git" ]; then
            git clone --recursive --depth 1 --branch "$THEOS_REF" \
              https://github.com/roothide/theos.git "$HOME/theos" || \
            git clone --recursive --depth 1 https://github.com/roothide/theos.git "$HOME/theos"
          fi
          brew install ldid 2>/dev/null || true
          ldid -V 2>/dev/null || true

      - name: 安装 iOS SDK（优先使用 14.5 以确保 Preferences 框架存在）
        id: sdk
        env:
          SDK_INPUT: ${{ inputs.sdk-version || '14.5' }}
        run: |
          set -x
          mkdir -p "$HOME/theos/sdks"
          cd "$HOME/theos/sdks"
          
          # 优先尝试下载用户指定的版本（默认 14.5）
          TARGET_SDK="iPhoneOS${SDK_INPUT}.sdk"
          if [ ! -d "$TARGET_SDK" ]; then
            echo "尝试下载 SDK ${SDK_INPUT} ..."
            for url in \
              "https://github.com/theos/sdks/releases/download/master-146e41f/${TARGET_SDK}.tar.xz" \
              "https://github.com/theos/sdks/raw/master/${TARGET_SDK}.tar.xz"; do
              if curl -fsSL "$url" -o /tmp/sdk.tar.xz; then
                tar -xf /tmp/sdk.tar.xz && rm -f /tmp/sdk.tar.xz
                echo "成功下载 ${TARGET_SDK}"
                break
              fi
            done
          fi
          
          # 若仍未找到，则尝试几个已知包含 Preferences 的版本
          if [ ! -d "$TARGET_SDK" ]; then
            echo "指定 SDK 下载失败，尝试 fallback 版本 (14.5, 15.2)"
            for sdk in 14.5 15.2; do
              if [ -d "iPhoneOS${sdk}.sdk" ]; then
                echo "已存在 iPhoneOS${sdk}.sdk"
                TARGET_SDK="iPhoneOS${sdk}.sdk"
                break
              fi
              for url in \
                "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS${sdk}.sdk.tar.xz" \
                "https://github.com/theos/sdks/raw/master/iPhoneOS${sdk}.sdk.tar.xz"; do
                if curl -fsSL "$url" -o /tmp/sdk.tar.xz; then
                  tar -xf /tmp/sdk.tar.xz && rm -f /tmp/sdk.tar.xz
                  TARGET_SDK="iPhoneOS${sdk}.sdk"
                  echo "成功下载 fallback ${TARGET_SDK}"
                  break 2
                fi
              done
            done
          fi
          
          # 最后尝试 update-theos-sdks（可能下载最新，不一定含私有框架）
          if [ ! -d "$TARGET_SDK" ]; then
            echo "所有手动下载失败，尝试 update-theos-sdks ..."
            "$HOME/theos/bin/update-theos-sdks"
            # 找到最新下载的 SDK
            TARGET_SDK=$(ls -1d iPhoneOS*.sdk 2>/dev/null | head -1)
          fi
          
          if [ -z "$TARGET_SDK" ] || [ ! -d "$TARGET_SDK" ]; then
            echo "::error::无法安装任何 iOS SDK"
            exit 1
          fi
          
          SDK_PATH="$HOME/theos/sdks/$TARGET_SDK"
          echo "THEOS_SDK_PATH=$SDK_PATH" >> "$GITHUB_ENV"
          echo "SDK_PATH=$SDK_PATH" >> "$GITHUB_OUTPUT"
          echo "已安装 SDK: $TARGET_SDK (路径: $SDK_PATH)"
          
          # 验证 Preferences.framework（私有框架）
          if [ -d "$SDK_PATH/System/Library/PrivateFrameworks/Preferences.framework" ]; then
            echo "✅ Preferences.framework 存在"
          else
            echo "::warning::⚠️ 未找到 Preferences.framework，构建可能失败。尝试更换 SDK 版本（如 14.5）"
            # 列出 PrivateFrameworks 前几项以便调试
            ls -la "$SDK_PATH/System/Library/PrivateFrameworks/" | head -20 || true
          fi

      - name: 构建 deb
        env:
          PKG_NAME: ${{ needs.prepare.outputs.pkg-name }}
          EXTRA_FLAGS: ${{ inputs.extra-make-flags }}
        run: |
          set -x
          echo "make version: $(make --version | head -1)"
          echo "shell: $0 / SHELL=$SHELL"
          echo "THEOS_SDK_PATH: ${{ env.THEOS_SDK_PATH }}"
          
          echo "::group::make clean"
          make clean THEOS="$HOME/theos" || true
          echo "::endgroup::"
          
          echo "::group::make ${{ inputs.make-target || 'package' }}"
          set +e
          make ${{ inputs.make-target || 'package' }} \
            THEOS="$HOME/theos" \
            THEOS_PACKAGE_SCHEME=${{ matrix.scheme }} \
            THEOS_SDK_PATH="${{ env.THEOS_SDK_PATH }}" \
            $EXTRA_FLAGS 2>&1 | tee /tmp/build_output.log
          _status=${PIPESTATUS[0]}
          set -e
          echo "::endgroup::"
          
          if [ "$_status" -ne 0 ]; then
            echo "::error::make 失败，退出码 $_status"
            grep -iE "error|fail|no such|not found|make\[|cannot|undefined|missing|fatal|recipe|stop|mismatch|version|No rule" /tmp/build_output.log | tail -25 | while IFS= read -r line; do
              printf "::error::%s\n" "${line:0:200}"
            done
            exit "$_status"
          fi

      - name: 收集产物
        env:
          PKG_NAME: ${{ needs.prepare.outputs.pkg-name }}
        run: |
          set -x
          mkdir -p artifacts
          find packages -name "*.deb" -print -exec cp {} artifacts/ \;
          if [ -z "$(ls -A artifacts 2>/dev/null)" ]; then
            echo "::error::未找到 .deb 产物"
            exit 1
          fi
          echo "## 产物清单" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.deb; do
            name=$(basename "$f")
            size=$(du -h "$f" | cut -f1)
            echo "- \`$name\` ($size)" >> $GITHUB_STEP_SUMMARY
          done
          ls -la artifacts/

      - name: 上传 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.pkg-name }}-${{ matrix.scheme }}
          path: artifacts/*.deb
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention || 30 }}